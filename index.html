<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mohammad Mansib Nawaz - Backend Engineer & Security Specialist with 4 years of experience in secure API development">
    <title>Mohammad Mansib Nawaz - Portfolio</title>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        darkBg: '#1E293B',
                        darkText: '#CBD5E1',
                        accent: '#0EA5E9'
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-gradient-to-b from-darkBg via-gray-900 to-blue-900 text-darkText min-h-screen flex flex-col">

    <!-- Navigation -->
    <header class="p-4 sm:p-6 shadow-md bg-darkBg bg-opacity-90 backdrop-blur-sm sticky top-0 z-10">
        <div id="main-nav"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center text-center p-6">
        <!-- Avatar with subtle animation -->
        <div class="w-32 h-32 mb-8 relative overflow-hidden rounded-full ring-4 ring-primary ring-offset-2 ring-offset-transparent hover:scale-105 transition-transform duration-300">
            <img src="img\avatar.jpg" alt="Mohammad Mansib Nawaz" class="w-full h-full object-cover">
        </div>
        
        <!-- Description container -->
        <div class="bg-darkBg bg-opacity-70 p-6 rounded-2xl shadow-lg max-w-2xl">
            <h1 class="text-2xl font-bold mb-4">Hello, I’m <span class="text-primary">Mohammad Mansib Nawaz</span></h1>
            <p class="text-lg leading-relaxed">
                With <strong>4 years of experience</strong> in backend engineering and network security and analysis,
                I provide services related to <strong>FastAPI</strong> and secure API development.
            </p>
            <div class="mt-4 h-8">
                <span id="typewriter" class="text-primary font-semibold"></span>
            </div>
            <!-- Button -->
            <div class="mt-8">
                <a href="contact.html" class="bg-primary text-white px-6 py-2 rounded-full shadow-xl hover:bg-accent transition-colors duration-300">
                    Hire
                </a>
            </div>
        </div>
    </main>

    <!-- Social Media -->
    <div id="social-icons" class="flex justify-center space-x-6 mb-8"></div>

    <!-- Footer -->
    <footer id="main-footer" class="p-6 text-center text-gray-400 bg-darkBg bg-opacity-80"></footer>

    <script src="js/components.js"></script>
    <script>
        // Initialize typewriter effect for home page
        window.addEventListener('load', function() {
            typewriterEffect('typewriter', 'Specializing in secure API development and backend solutions', 50);
        });
    </script>
</body>
</html>
