<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Mohammad Mansib Nawaz for backend engineering and security consulting">
    <title>Contact - Mohammad Mansib Nawaz</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="common.js"></script>
</head>
<body class="bg-gradient-to-b from-darkBg via-gray-900 to-blue-900 text-darkText min-h-screen flex flex-col">
    
    <!-- Navigation -->
    <header class="p-4 sm:p-6 bg-darkBg bg-opacity-90 backdrop-blur-sm sticky top-0 z-10">
        <nav class="flex justify-end space-x-6 text-white">
            <a href="index.html" class="hover:text-primary transition-colors duration-300">Home</a>
            <a href="project.html" class="hover:text-primary transition-colors duration-300">Project</a>
            <a href="about.html" class="hover:text-primary transition-colors duration-300">About Me</a>
            <a href="contact.html" class="hover:text-primary transition-colors duration-300">Contact</a>
        </nav>
    </header>
    
    <!-- Contact Form Section -->
    <main class="flex-grow flex flex-col items-center justify-center text-center p-6">
        <div class="max-w-lg bg-darkBg bg-opacity-70 p-8 rounded-2xl shadow-lg">
            <h1 class="text-3xl font-bold text-primary mb-4">Get in Touch</h1>
            <p class="text-lg leading-relaxed mb-6">Feel free to reach out for collaborations or inquiries. I'll get back to you as soon as possible.</p>
            
            <form action="#" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2" for="name">Name</label>
                    <input type="text" id="name" name="name" class="w-full p-2 rounded bg-gray-700 text-white border border-gray-500 focus:border-primary focus:ring-1 focus:ring-primary" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2" for="email">Email</label>
                    <input type="email" id="email" name="email" class="w-full p-2 rounded bg-gray-700 text-white border border-gray-500 focus:border-primary focus:ring-1 focus:ring-primary" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2" for="message">Message</label>
                    <textarea id="message" name="message" rows="4" class="w-full p-2 rounded bg-gray-700 text-white border border-gray-500 focus:border-primary focus:ring-1 focus:ring-primary" required></textarea>
                </div>
                <button type="submit" class="bg-primary text-white px-6 py-2 rounded-full shadow-lg hover:bg-accent transition duration-300 w-full">
                    Send Message
                </button>
            </form>
        </div>
    </main>
    <div id="social-links" class="flex justify-center space-x-6 mb-8">
        <!-- Links will be rendered by common.js -->
    </div>
    <!-- Footer -->
    <footer class="p-6 text-center text-gray-400 bg-darkBg bg-opacity-80">
        <p>&copy; 2025 <span class="text-primary">Mohammad Mansib Nawaz</span>. All rights reserved.</p>
        
    </footer>
    
</body>
</html>
