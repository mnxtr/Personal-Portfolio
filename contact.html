    <script src="https://cdn.tailwindcss.com"></script>

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6', // Define primary color
                        darkBg: '#1E293B',   // Define background color
                        darkText: '#CBD5E1'  // Define text color
                    }
                }
            }
        }
    </script>

<body class="bg-darkBg text-darkText min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <header class="p-4 sm:p-6">
        <nav class="flex justify-end space-x-6 text-white">
            <a href="index.html" class="hover:text-primary">Home</a>

            <a href="contact.html" class="hover:text-primary">Contact</a>
        </nav>

    <!-- Contact Form Section -->
    <main class="flex-grow flex flex-col items-center justify-center text-center p-6">
        <h1 class="text-3xl font-bold text-primary mb-6">Get in Touch</h1>
        <p class="max-w-2xl text-lg leading-relaxed mb-6">
            Feel free to reach out for collaborations or inquiries. I will get back to you as soon as possible.
        </p>
        
        <form action="#" method="POST" class="w-full max-w-lg bg-gray-800 p-6 rounded-lg shadow-lg">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2" for="name">Name</label>
                <input type="text" id="name" name="name" class="w-full p-2 rounded bg-gray-700 text-white" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2" for="email">Email</label>
                <input type="email" id="email" name="email" class="w-full p-2 rounded bg-gray-700 text-white" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2" for="message">Message</label>
                <textarea id="message" name="message" rows="4" class="w-full p-2 rounded bg-gray-700 text-white" required></textarea>
            </div>
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded hover:bg-blue-600 transition duration-300">
                Send Message
            </button>
        </form>
    </main>
